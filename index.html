<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>F.R.I.D.A.Y. // MAC COMMAND CENTER // V45</title>
    <style>
        :root {
            --bg: #050505;
            --gold: #ff8c00;
            --iron-red: #ff2e00;
            --cyan: #00f3ff;
            --border: rgba(255, 140, 0, 0.3);
            --glass: rgba(255, 140, 0, 0.07);
        }

        * {
            box-sizing: border-box;
            font-family: 'SF Pro Display', 'Helvetica Neue', sans-serif;
            cursor: crosshair;
        }

        body {
            background: var(--bg);
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a0f00 0%, #050505 100%);
        }

        /* Sidebar HUD */
        #sidebar {
            width: 320px;
            background: rgba(0, 0, 0, 0.8);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px;
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .hud-header {
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: var(--gold);
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .widget {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            position: relative;
        }

        .widget::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 5px;
            border-top: 1px solid var(--gold);
            border-left: 1px solid var(--gold);
        }

        /* Radar Animation */
        #radar {
            width: 100%;
            aspect-ratio: 1;
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 50%;
            position: relative;
        }

        #sweep {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan));
            transform-origin: left center;
            animation: spin 4s linear infinite;
        }

        /* Main Terminal */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            position: relative;
        }

        #terminal {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        #output {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            font-family: 'Menlo', monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .ai-msg {
            color: var(--cyan);
            margin-bottom: 20px;
            padding-left: 15px;
            border-left: 2px solid var(--cyan);
            animation: scanline 0.2s linear;
        }

        .user-msg {
            color: var(--gold);
            text-align: right;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .input-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 20px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            outline: none;
            font-family: 'Menlo', monospace;
        }

        @keyframes spin {
            100% {
                transform: translateY(-50%) rotate(360deg);
            }
        }

        @keyframes scanline {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        body.alarm {
            animation: alarm-pulse 1s infinite;
        }

        @keyframes alarm-pulse {
            0% {
                background-color: #050505;
            }

            50% {
                background-color: #300;
            }

            100% {
                background-color: #050505;
            }
        }
    </style>
</head>

<body onclick="document.querySelector('input').focus()">

    <aside id="sidebar">
        <div class="hud-header">F.R.I.D.A.Y. // CORE V45</div>

        <div class="widget">
            <div style="font-size: 10px; color: var(--gold); margin-bottom: 10px;">SYSTEM UPLINK</div>
            <div id="power" style="font-size: 24px; color: var(--cyan); font-family: monospace;">100%</div>
            <div style="height: 2px; background: rgba(255,255,255,0.1); margin-top: 10px;">
                <div id="bar"
                    style="width: 100%; height: 100%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan);"></div>
            </div>
        </div>

        <div class="widget">
            <div id="radar">
                <div id="sweep"></div>
            </div>
        </div>

        <div style="margin-top: auto; font-size: 10px; color: rgba(255,255,255,0.3); line-height: 1.5;">
            STARK IND. OS X<br>LOC: MUELHEIM, GER<br>USER: T. STARK
        </div>
    </aside>

    <main>
        <div id="terminal">
            <div id="output">
                <div class="ai-msg">Systeme auf Mac-Protokoll kalibriert, Sir. Alle Desktop-Links sind scharfgeschaltet.
                    Erwarte Befehl...</div>
            </div>
            <div class="input-box">
                <span style="color: var(--gold);">></span>
                <input type="text" placeholder="Kommando eingeben..." autofocus
                    onkeypress="if(event.key==='Enter') execute(this.value)">
            </div>
        </div>
    </main>

    <script>
        const output = document.getElementById('output');
        const synth = window.speechSynthesis;

        function speak(text) {
            if (synth.speaking) synth.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.pitch = 0.8;
            msg.rate = 1.1;
            output.innerHTML += `<div class="ai-msg">${text}</div>`;
            output.scrollTop = output.scrollHeight;
            synth.speak(msg);
        }

        function execute(val) {
            const cmd = val.toLowerCase();
            output.innerHTML += `<div class="user-msg">${val}</div>`;
            document.querySelector('input').value = '';

            setTimeout(() => {
                // GIVE ME EVERYTHING (Mac Edition)
                if (cmd.includes("give me everything")) {
                    speak("Maximaler Work-Mode. Öffne VS Code, Claude und Ihre Musik.");
                    window.open("vscode://", "_self"); // Versucht die Mac App zu öffnen
                    window.open("https://vscode.dev"); // Backup im Browser
                    window.open("https://claude.ai");
                    window.open("https://open.spotify.com/intl-de/track/08mG3Y1vljYA6bvDt4Wqkj?si=a69dbfcc4e1a42a7");
                }
                // DADDYS HOME
                else if (cmd.includes("daddys home")) {
                    speak("Willkommen zurück, Boss. Desktop-Entertainment wird hochgefahren.");
                    window.open("spotify://", "_self"); // Öffnet die Spotify App auf dem Mac
                    window.open("https://open.spotify.com/intl-de/track/08mG3Y1vljYA6bvDt4Wqkj?si=a69dbfcc4e1a42a7");
                    window.open("https://x.com");
                    window.open("https://youtube.com");
                    window.open("https://gemini.google.com");
                }
                // WAKE UP
                else if (cmd.includes("wake up")) {
                    speak("Guten Morgen, Sir. Feeds sind online.");
                    window.open("https://x.com");
                    window.open("https://perplexity.ai");
                }
                // BABY MONITOR
                else if (cmd.includes("baby monitor")) {
                    speak("Baby-Monitor aktiv. TikTok und Instagram werden geladen.");
                    window.open("https://tiktok.com");
                    window.open("https://instagram.com");
                }
                // HOUSE PARTY (Mac Overload)
                else if (cmd.includes("house party")) {
                    speak("Alle Einheiten! Ich starte den kompletten Stark-Stack.");
                    document.body.classList.add('alarm');
                    window.open("vscode://", "_self");
                    window.open("https://claude.ai");
                    window.open("https://x.com");
                    window.open("https://youtube.com");
                    window.open("https://open.spotify.com/intl-de/track/08mG3Y1vljYA6bvDt4Wqkj?si=a69dbfcc4e1a42a7");
                }
                // STATUS
                else if (cmd.includes("status")) {
                    speak("Mac-Zentralrechner nominal. Alle Kerne stabil.");
                }
                // CLEAN SLATE
                else if (cmd.includes("clean slate") || cmd.includes("clear")) {
                    output.innerHTML = '';
                    document.body.classList.remove('alarm');
                    speak("Terminal bereinigt.");
                }
                else {
                    speak(`Suche im Web nach '${val}'...`);
                    window.open(`https://duckduckgo.com/?q=!ducky+${encodeURIComponent(val)}`);
                }
            }, 400);
        }
    </script>
</body>

</html>
