<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.R.I.D.A.Y. // STARK INDUSTRIES // V40</title>
    <style>
        :root {
            --bg: #050100;
            --gold: #ff8c00;
            --iron-red: #ff2e00;
            --white: #ffffff;
            --border: rgba(255, 140, 0, 0.3);
            --glass: rgba(255, 140, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--white);
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 30%, #251000 0%, #050100 100%);
        }

        #sidebar {
            width: 280px;
            background: rgba(10, 5, 0, 0.95);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 25px;
            z-index: 20;
            backdrop-filter: blur(20px);
        }

        .sidebar-title {
            color: var(--gold);
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            opacity: 0.7;
        }

        #globe-container {
            width: 150px;
            height: 150px;
            margin-bottom: 10px;
            position: relative;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            filter: drop-shadow(0 0 20px var(--gold));
        }

        #terminal {
            width: 100%;
            max-width: 950px;
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(30px);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        #output {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .line {
            animation: fadeIn 0.3s ease-out;
            display: flex;
            flex-direction: column;
        }

        .ai-text {
            color: white;
            align-self: flex-start;
            background: rgba(255, 140, 0, 0.05);
            padding: 12px 20px;
            border-radius: 12px;
            border-top-left-radius: 2px;
            border-left: 3px solid var(--gold);
        }

        .user-text {
            color: white;
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.08);
            padding: 10px 18px;
            border-radius: 12px;
            border-bottom-right-radius: 2px;
        }

        .input-area {
            padding: 20px 30px;
            background: rgba(15, 8, 0, 0.9);
            display: flex;
            align-items: center;
            gap: 15px;
            border-top: 1px solid var(--border);
            z-index: 100;
        }

        input {
            flex: 1;
            background: transparent;
            border: 1px solid rgba(255, 140, 0, 0.3);
            color: white;
            outline: none;
            font-size: 1.1rem;
            padding: 10px 15px;
            border-radius: 8px;
        }

        .icon-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--gold);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .icon-btn.active {
            background: var(--iron-red);
            border: none;
            animation: pulse 1s infinite;
        }

        #voice-overlay {
            position: absolute;
            inset: 0;
            background: rgba(5, 1, 0, 0.98);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        #voice-overlay.show {
            display: flex;
        }

        .wave {
            width: 60px;
            height: 60px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            animation: ripple 1.2s infinite;
        }

        @keyframes ripple {
            0% {
                transform: scale(0.6);
                opacity: 1;
            }

            100% {
                transform: scale(1.8);
                opacity: 0;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body onclick="document.getElementById('user-input').focus()">

    <aside id="sidebar">
        <div class="sidebar-title">F.R.I.D.A.Y. // STARK-CORP</div>
        <div style="font-size: 0.7rem; color: var(--gold); opacity: 0.6;">SPOTIFY LINK UPDATED</div>
    </aside>

    <main>
        <header>
            <div>Workshop-Eingabe aktiv</div>
            <div id="clock">00:00:00</div>
        </header>
        <div id="globe-container"><canvas id="globeCanvas"></canvas></div>
        <div id="terminal">
            <div id="voice-overlay">
                <div class="wave"></div>
                <p style="color: var(--gold); margin-top: 15px;">HÖRE...</p>
            </div>
            <div id="output">
                <div class="line">
                    <div class="ai-text">System-Update V40 geladen. Spotify-Bypass auf neuen Endpunkt kalibriert. Tippen
                        Sie einen Befehl, Boss.</div>
                </div>
            </div>
            <div class="input-area" onclick="event.stopPropagation()">
                <button class="icon-btn" id="mic-btn" onclick="startVoice()">🎙</button>
                <input type="text" id="user-input" placeholder="Anweisung eingeben..." autocomplete="off"
                    onkeypress="if(event.key==='Enter') processInput()" autofocus>
                <button onclick="processInput()"
                    style="background:none; border:none; color:var(--gold); font-weight:bold; cursor:pointer; padding: 10px;">RUN</button>
            </div>
        </div>
    </main>

    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);

        // Globus Rendering
        const canvas = document.getElementById('globeCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = 150; let height = canvas.height = 150;
        let points = []; const numPoints = 300; let rotation = 0; let isSpeaking = false;
        const phi = Math.PI * (3 - Math.sqrt(5));
        for (let i = 0; i < numPoints; i++) {
            let y = 1 - (i / (numPoints - 1)) * 2;
            let radius = Math.sqrt(1 - y * y);
            let theta = phi * i;
            points.push({ x: Math.cos(theta) * radius, y, z: Math.sin(theta) * radius });
        }
        function drawGlobe() {
            ctx.clearRect(0, 0, width, height);
            rotation += isSpeaking ? 0.05 : 0.007;
            points.forEach(p => {
                let rx = p.x * Math.cos(rotation) - p.z * Math.sin(rotation);
                let rz = p.x * Math.sin(rotation) + p.z * Math.cos(rotation);
                let px = rx * 65 + width / 2; let py = p.y * 65 + height / 2;
                let alpha = (rz + 1) / 2;
                if (alpha > 0.2) {
                    ctx.beginPath(); ctx.arc(px, py, isSpeaking ? 2 : 1, 0, Math.PI * 2);
                    ctx.fillStyle = isSpeaking ? `rgba(255, 46, 0, ${alpha})` : `rgba(255, 140, 0, ${alpha})`; ctx.fill();
                }
            });
            requestAnimationFrame(drawGlobe);
        }
        drawGlobe();

        // Sprach-Engine
        const synth = window.speechSynthesis;
        function speak(text) {
            if (synth.speaking) synth.cancel();
            let utter = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            utter.voice = voices.find(v => v.lang.startsWith('de') && (v.name.includes('Google') || v.name.includes('Natural'))) || voices[0];
            utter.pitch = 0.8;
            utter.rate = 1.0;
            utter.onstart = () => { isSpeaking = true; };
            utter.onend = () => { isSpeaking = false; };
            const out = document.getElementById('output');
            out.innerHTML += `<div class="line"><div class="ai-text">${text}</div></div>`;
            out.scrollTop = out.scrollHeight;
            synth.speak(utter);
        }

        // Sprach-Erkennung
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if (recognition) {
            recognition.lang = 'de-DE';
            recognition.onstart = () => { document.getElementById('voice-overlay').classList.add('show'); };
            recognition.onend = () => { document.getElementById('voice-overlay').classList.remove('show'); };
            recognition.onresult = (event) => { document.getElementById('user-input').value = event.results[0][0].transcript; processInput(); };
        }
        function startVoice() { if (recognition) recognition.start(); }

        // Befehls-Logik
        function processInput() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            const cmd = text.toLowerCase();
            if (!text) return;

            document.getElementById('output').innerHTML += `<div class="line"><div class="user-text">${text}</div></div>`;
            input.value = "";

            setTimeout(() => {
                if (cmd.includes("daddys home") || (cmd.includes("wake up") && cmd.includes("home"))) {
                    speak("Willkommen zurück, Boss. X, YouTube und Ihr Spotify-Stream werden geladen. Workshop-Status ist nominal.");

                    // DER NEUE SPOTIFY LINK
                    window.open("https://open.spotify.com/intl-de/track/08mG3Y1vljYA6bvDt4Wqkj?si=a69dbfcc4e1a42a7", "_blank");

                    // DIE ANDEREN APPS
                    window.open("https://x.com");
                    window.open("https://www.youtube.com");
                    window.open("https://www.tiktok.com");
                    window.open("https://gemini.google.com");
                }
                else if (cmd.includes("wake up")) {
                    speak("Protokoll aktiv, Sir. Alle Kanäle inklusive X sind online.");
                    window.open("https://x.com");
                    window.open("https://www.youtube.com");
                    window.open("https://www.perplexity.ai");
                }
                else {
                    speak(`Ich analysiere '${text}' für Sie, Sir.`);
                    window.open(`https://duckduckgo.com/?q=!ducky+${encodeURIComponent(text)}`);
                }
            }, 400);
            input.focus();
        }

        window.onload = () => { document.getElementById('user-input').focus(); };
    </script>
</body>

</html>
